<!-- templates/manage_users.html -->
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Manage Users</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/static/styles.css">
  <meta name="viewport" content="width=device-width,initial-scale=1">
</head>

<body>
<div class="container py-4">

  <div class="d-flex justify-content-between align-items-center mb-3">
    <h3><i class="fa-solid fa-users fa-lg text-primary"></i> Manage Users</h3>

    <div>
      <a href="/admin_dashboard" class="btn btn-outline-secondary me-2">
        <i class="fa-solid fa-arrow-left"></i> Back
      </a>

      <button id="themeToggle" class="btn btn-dark">
        <i class="fa-solid fa-moon"></i>
      </button>
    </div>
  </div>

  <!-- Add User -->
  <div class="card p-4 shadow-sm">
    <h5 class="mb-3">Add New User</h5>

    <form action="/add_user" method="POST" class="row g-3">

      <div class="col-md-6">
        <label class="form-label">Name</label>
        <input name="name" class="form-control" required>
      </div>

      <div class="col-md-6">
        <label class="form-label">Mobile No</label>
        <input name="phone" class="form-control" required>
      </div>

      <div class="col-md-6">
        <label class="form-label">Email</label>
        <input name="email" class="form-control" required>
      </div>

      <div class="col-md-6">
        <label class="form-label">Address</label>
        <input name="address" class="form-control">
      </div>

      <div class="col-md-4">
        <label class="form-label">Date of Joining</label>
        <input type="date" name="date_join" class="form-control" required>
      </div>

      <div class="col-md-4">
        <label class="form-label">Date of Leaving</label>
        <input type="date" name="date_leave" class="form-control">
      </div>

      <div class="col-md-4">
        <label class="form-label">Time (Joining)</label>
        <input type="time" name="time_join" class="form-control">
      </div>

      <div class="col-12 mt-2">
        <button class="btn btn-primary">
          <i class="fa-solid fa-user-plus"></i> Insert User
        </button>
      </div>

    </form>
  </div>

  <!-- Users List -->
  <div class="card p-4 mt-4 shadow-sm">
    <h5>All Users</h5>

    <div class="table-responsive mt-3">
      <table class="table align-middle table-hover">
        <thead class="table-light">
          <tr>
            <th>ID</th><th>Name</th><th>Phone</th><th>Email</th><th>Address</th><th>Actions</th>
          </tr>
        </thead>

        <tbody>
          {% for u in users %}
          <tr>
            <td>{{ u[0] }}</td>
            <td>{{ u[1] }}</td>
            <td>{{ u[2] }}</td>
            <td>{{ u[3] }}</td>
            <td>{{ u[4] }}</td>
            <td>
              <a href="/edit_user/{{ u[0] }}" class="btn btn-outline-primary btn-sm">
                <i class="fa-solid fa-pen-to-square"></i>
              </a>
              <a href="/delete_user/{{ u[0] }}" class="btn btn-outline-danger btn-sm">
                <i class="fa-solid fa-trash"></i>
              </a>
            </td>
          </tr>
          {% endfor %}
        </tbody>
      </table>
    </div>
  </div>

</div>

<script>
document.getElementById("themeToggle").addEventListener("click", () => {
  document.documentElement.classList.toggle("dark");
  localStorage.setItem("theme", document.documentElement.classList.contains("dark") ? "dark" : "light");
});

if (localStorage.getItem("theme") === "dark") {
  document.documentElement.classList.add("dark");
}
</script>

</body>
</html>
