<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Sign In - Prajapati Palace</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body class="bg-cream">

    <header class="d-flex justify-content-between align-items-center px-4 py-3 bg-white border-bottom shadow-sm">
        <div class="d-flex align-items-center gap-4">
            <i class="fa-solid fa-bars fs-5 text-muted"></i>
            <nav class="d-none d-md-flex gap-4 small text-uppercase text-secondary fw-bold">
                <a href="/" class="text-reset text-decoration-none">Hotels <i class="fa-solid fa-chevron-down ms-1"></i></a>
                <a href="/" class="text-reset text-decoration-none">Experiences</a>
                <a href="/" class="text-reset text-decoration-none">Offers</a>
            </nav>
        </div>

        <a class="navbar-brand text-center position-absolute start-50 translate-middle-x" href="/">
            <div class="brand-logo" style="font-size: 1.2rem;">PRAJAPATI PALACE</div>
            <div class="brand-sub text-gold" style="font-size: 0.5rem; letter-spacing: 2px;">PALACES HOTELS RESORTS</div>
        </a>

        <div class="d-flex align-items-center gap-3">
            <a href="/login" class="text-reset text-decoration-none small text-uppercase d-none d-md-block"><i class="fa-regular fa-user"></i> Login</a>
            <a href="/book" class="btn btn-gold text-white text-uppercase rounded-0 px-4 fw-bold" style="font-size: 0.8rem;">Book</a>
        </div>
    </header>

    <div class="container d-flex justify-content-center align-items-center py-5" style="min-height: 80vh;">
        <div class="w-100" style="max-width: 500px;">
            
            <div class="text-center mb-5">
                <h2 class="font-playfair display-6 mb-3 text-dark">Sign in to Prajapati Palace</h2>
                <p class="text-muted small">Welcome back. Please enter your details.</p>
            </div>

            <form id="loginForm" action="{{ url_for('login') }}" method="POST">
                
                <div class="mb-4">
                    <label class="form-label text-gold fw-bold small text-uppercase" style="font-size: 11px; letter-spacing: 1px;">Select Role</label>
                    <select name="role" id="roleSelect" class="form-select rounded-0 py-3 border-secondary bg-transparent">
                        <option value="user">User</option>
                        <option value="admin">Administrator</option>
                    </select>
                </div>

                <div id="userFields">
                    <div class="mb-4">
                        <label class="form-label text-gold fw-bold small text-uppercase" style="font-size: 11px; letter-spacing: 1px;">Email Address</label>
                        <input type="email" name="email" id="email" class="form-control rounded-0 py-3 border-secondary bg-transparent" placeholder="guest@example.com">
                    </div>
                    <div class="mb-4">
                        <label class="form-label text-gold fw-bold small text-uppercase" style="font-size: 11px; letter-spacing: 1px;">Mobile Number</label>
                        <input type="text" name="phone" id="phone" class="form-control rounded-0 py-3 border-secondary bg-transparent" placeholder="+91 98765 43210">
                    </div>
                </div>

                <div id="adminFields" style="display:none;">
                    <div class="mb-4">
                        <label class="form-label text-gold fw-bold small text-uppercase" style="font-size: 11px; letter-spacing: 1px;">Username</label>
                        <input type="text" name="username" id="username" class="form-control rounded-0 py-3 border-secondary bg-transparent">
                    </div>
                    <div class="mb-4">
                        <label class="form-label text-gold fw-bold small text-uppercase" style="font-size: 11px; letter-spacing: 1px;">Password</label>
                        <input type="password" name="password" id="password" class="form-control rounded-0 py-3 border-secondary bg-transparent">
                    </div>
                </div>

                <div class="mb-5">
                    <label class="form-label text-gold fw-bold small text-uppercase" style="font-size: 11px; letter-spacing: 1px;">Security Check</label>
                    <div class="border border-secondary rounded-0 p-3 d-flex align-items-center bg-transparent">
                        <span id="captchaExpr" class="fw-bold fs-5 me-3 font-monospace text-dark">...</span>
                        <input type="text" name="captcha_input" id="captchaInput" class="form-control border-0 shadow-none bg-transparent p-0 fs-5" required>
                    </div>
                    <input type="hidden" name="captcha_answer" id="captchaAns">
                    <div class="form-text text-muted small mt-2">Solve this simple math problem and enter the result.</div>
                </div>

                <div class="d-flex justify-content-between align-items-center mb-4 text-decoration-underline small text-dark">
                    <a href="#" class="text-reset">Forgot password?</a>
                    <a href="/register" class="text-reset">Create an account</a>
                </div>

                <button type="submit" class="btn btn-gold w-100 py-3 text-uppercase fw-bold rounded-0" style="letter-spacing: 1px;">
                    Login
                </button>

            </form>
        </div>
    </div>

    <footer class="bg-dark text-white py-4 mt-auto">
        <div class="container d-flex justify-content-between align-items-center small">
            <div>&copy; 2025 Prajapati Palace.</div>
            <div class="d-flex gap-3">
                <a href="#" class="text-white text-decoration-none">Privacy Policy</a>
                <a href="#" class="text-white text-decoration-none">Terms</a>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/app.js"></script>
</body>
</html>
