<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>All Bookings - Admin</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

    <link rel="stylesheet" href="/static/styles.css">
    <meta name="viewport" content="width=device-width,initial-scale=1">
</head>

<body>

<div class="container-center">

    <div class="header">
        <div class="brand">
            <i class="fa-solid fa-book fa-fw"></i> All Bookings
        </div>

        <button id="themeToggle" class="btn btn-ghost">
            <i class="fa-solid fa-moon"></i> Theme
        </button>
    </div>

    <div class="card">

        <table class="table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Guest</th>
                    <th>Room</th>
                    <th>Check-in</th>
                    <th>Check-out</th>
                    <th>Status</th>
                    <th style="width:180px;">Actions</th>
                </tr>
            </thead>

            <tbody>
            {% for b in bookings %}
                <tr>
                    <td>{{ b[0] }}</td>  <td>{{ b[6] }}</td>  <td>{{ b[7] }}</td>  <td>{{ b[3] }}</td>  <td>{{ b[4] }}</td>  <td>
                        <span class="badge 
                            {% if b[5]=='Confirmed' %} bg-primary
                            {% elif b[5]=='Completed' %} bg-success
                            {% else %} bg-danger {% endif %}">
                            {{ b[5] }}
                        </span>
                    </td>

                    <td>
                        <form action="{{ url_for('admin_update_booking', booking_id=b[0]) }}"
                              method="post" class="d-flex gap-2">

                            <select name="status" class="form-select form-select-sm">
                                <option {% if b[5]=='Confirmed' %}selected{% endif %}>Confirmed</option>
                                <option {% if b[5]=='Completed' %}selected{% endif %}>Completed</option>
                                <option {% if b[5]=='Cancelled' %}selected{% endif %}>Cancelled</option>
                            </select>

                            <button type="submit" class="btn btn-primary btn-sm">
                                <i class="fa-solid fa-pen"></i>
                            </button>
                        </form>

                        <a href="/booking/{{ b[0] }}/payments" class="btn btn-ghost btn-sm mt-2">
                            <i class="fa-solid fa-credit-card"></i> Payments
                        </a>

                    </td>
                </tr>
            {% endfor %}
            </tbody>
        </table>

    </div>

    <div class="mt-3">
        <a href="/admin_dashboard" class="btn btn-ghost">
            <i class="fa-solid fa-arrow-left"></i> Back to Dashboard
        </a>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="/static/app.js"></script>

</body>
</html>
