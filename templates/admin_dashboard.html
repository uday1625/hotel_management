<!doctype html>
<html lang="en">
<head>
    <title>Admin Dashboard - THE PRAJAPATI PALACE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/styles.css">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    
    <style>
        .dashboard-card {
            transition: all 0.3s ease;
            border: 1px solid var(--border);
            text-align: center;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 15px;
        }
        .dashboard-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
            box-shadow: 0 15px 30px rgba(197, 160, 89, 0.15);
        }
        .icon-circle {
            width: 70px;
            height: 70px;
            background: rgba(197, 160, 89, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary);
            margin-bottom: 10px;
        }
    </style>
</head>

<body class="bg-light dark-mode-bg">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow px-4 py-3">
        <a class="navbar-brand" href="#">
            <i class="fa-solid fa-crown text-warning"></i> The Prajapati Palace <span class="fs-6 fw-normal text-white-50">| Admin Panel</span>
        </a>

        <button class="btn btn-outline-light ms-auto rounded-pill" id="themeToggle">
            <i class="fa-solid fa-moon"></i> Theme
        </button>
    </nav>

    <div class="container my-5">
        <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4">

            <div class="col">
                <a href="/users" class="text-decoration-none">
                    <div class="card dashboard-card p-5">
                        <div class="icon-circle">
                            <i class="fa-solid fa-users-gear fa-2x"></i>
                        </div>
                        <h4>Manage Users</h4>
                        <p class="text-muted small">Add, Edit or Remove Staff & Guests</p>
                    </div>
                </a>
            </div>

            <div class="col">
                <a href="/rooms" class="text-decoration-none">
                    <div class="card dashboard-card p-5">
                        <div class="icon-circle">
                            <i class="fa-solid fa-hotel fa-2x"></i>
                        </div>
                        <h4>Room Management</h4>
                        <p class="text-muted small">Check Availability & Pricing</p>
                    </div>
                </a>
            </div>

            <div class="col">
                <a href="/admin/bookings" class="text-decoration-none">
                    <div class="card dashboard-card p-5">
                        <div class="icon-circle">
                            <i class="fa-solid fa-book-open-reader fa-2x"></i>
                        </div>
                        <h4>All Bookings</h4>
                        <p class="text-muted small">Track Check-ins & Check-outs</p>
                    </div>
                </a>
            </div>

            <div class="col">
                <a href="/admin/create_booking" class="text-decoration-none">
                    <div class="card dashboard-card p-5">
                        <div class="icon-circle">
                            <i class="fa-solid fa-calendar-plus fa-2x"></i>
                        </div>
                        <h4>New Reservation</h4>
                        <p class="text-muted small">Manual Booking Entry</p>
                    </div>
                </a>
            </div>

            <div class="col">
                <a href="/admin/payments" class="text-decoration-none">
                    <div class="card dashboard-card p-5">
                        <div class="icon-circle">
                            <i class="fa-solid fa-file-invoice-dollar fa-2x"></i>
                        </div>
                        <h4>Transactions</h4>
                        <p class="text-muted small">Monitor Revenue & Invoices</p>
                    </div>
                </a>
            </div>

            <div class="col">
                <a href="/logout" class="text-decoration-none">
                    <div class="card dashboard-card p-5" style="border-color: #ef4444;">
                        <div class="icon-circle" style="color: #ef4444; background: rgba(239,68,68,0.1);">
                            <i class="fa-solid fa-power-off fa-2x"></i>
                        </div>
                        <h4 class="text-danger">Logout</h4>
                        <p class="text-muted small">End Safe Session</p>
                    </div>
                </a>
            </div>

        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
