<!doctype html>
<html>
<head>
  <title>Payments</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/static/styles.css">
  <meta name="viewport" content="width=device-width,initial-scale=1">
</head>

<body>
<div class="container py-4">

  <h3><i class="fa-solid fa-money-check-dollar text-success"></i> Payments for Booking #{{ booking_id }}</h3>

  <div class="mt-3">
    <a href="{{ url_for('make_payment', booking_id=booking_id) }}" class="btn btn-primary">
      <i class="fa-solid fa-plus"></i> Make Payment
    </a>

    <a href="/" class="btn btn-outline-secondary ms-2">
      <i class="fa-solid fa-home"></i> Home
    </a>
  </div>

  <div class="card mt-4 p-3 shadow-sm">
    <div class="table-responsive">
      <table class="table table-hover align-middle">
        <thead class="table-light">
          <tr>
            <th>Payment ID</th>
            <th>Amount</th>
            <th>Date</th>
            <th>Method</th>
          </tr>
        </thead>

        <tbody>
          {% for p in payments %}
          <tr>
            <td>{{ p[0] }}</td>
            <td>₹{{ p[2] }}</td>
            <td>{{ p[3] }}</td>
            <td>{{ p[4] }}</td>
          </tr>
          {% endfor %}
        </tbody>
      </table>
    </div>
  </div>

</div>
</body>
</html>
