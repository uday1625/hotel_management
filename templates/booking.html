<!doctype html>
<html lang="en">
<head>
    <title>Book Room</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/styles.css">

    <meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body class="bg-light dark-mode-bg">

    <div class="container my-5">

        <div class="card shadow-lg p-4">

            <h2>
                <i class="fa-solid fa-bed"></i> Book a Room
            </h2>

            <!-- Flash Messages -->
            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for c,m in messages %}
                    <div class="alert alert-info mt-2">{{ m }}</div>
                {% endfor %}
            {% endif %}
            {% endwith %}

            <form method="POST" action="{{ url_for('book') }}" class="row g-3 mt-3">

                <div class="col-12">
                    <label class="form-label fw-bold">Choose Room</label>
                    <select name="room_id" class="form-select" required>
                        {% for r in rooms %}
                        <option value="{{ r[0] }}">
                            {{ r[1] }} — ₹{{ r[3] }} — {{ r[4] }}
                        </option>
                        {% endfor %}
                    </select>
                </div>

                <div class="col-md-6">
                    <label class="form-label fw-bold">Check-in</label>
                    <input type="date" name="check_in" class="form-control" required>
                </div>

                <div class="col-md-6">
                    <label class="form-label fw-bold">Check-out</label>
                    <input type="date" name="check_out" class="form-control" required>
                </div>

                <div class="col-12">
                    <button class="btn btn-primary w-100 py-2 fw-bold">
                        <i class="fa-solid fa-circle-check"></i> Book Now
                    </button>
                </div>

            </form>

            <a href="/user_dashboard" class="btn btn-secondary mt-3">
                <i class="fa-solid fa-arrow-left"></i> Back
            </a>

        </div>

    </div>

    <script src="/static/app.js"></script>
</body>
</html>
