<!doctype html>
<html lang="en">
<head>
    <title>Create Booking - Prajapati Palace</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

    <link rel="stylesheet" href="/static/styles.css">

    <meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark px-3 shadow">
        <a class="navbar-brand" href="/admin_dashboard">
            <i class="fa-solid fa-crown text-warning"></i> Prajapati Palace <span class="fs-6 text-white-50">| Admin Panel</span>
        </a>

        <button class="btn btn-outline-light ms-auto" id="themeToggle" style="display: none;">
            <i class="fa-solid fa-moon"></i>
        </button>
    </nav>

    <div class="container my-5">

        <div class="card shadow-lg rounded-4 p-4">
            <h2 class="mb-4" style="font-family: 'Playfair Display', serif;">
                <i class="fa-solid fa-calendar-plus text-gold"></i> Create Booking
            </h2>

            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for c, m in messages %}
                    <div class="alert alert-info">{{ m }}</div>
                {% endfor %}
            {% endif %}
            {% endwith %}

            <form method="POST" class="row g-3">

                <div class="col-md-6">
                    <label class="form-label fw-bold">Guest</label>
                    <select name="guest_id" class="form-select" required>
                        {% for g in guests %}
                        <option value="{{ g[0] }}">{{ g[1] }} ({{ g[3] }})</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="col-md-6">
                    <label class="form-label fw-bold">Room</label>
                    <select name="room_id" class="form-select" required>
                        {% for r in rooms %}
                        <option value="{{ r[0] }}">{{ r[1] }} — ₹{{ r[3] }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="col-md-6">
                    <label class="form-label fw-bold">Check-in</label>
                    <input type="date" name="check_in" class="form-control" required>
                </div>

                <div class="col-md-6">
                    <label class="form-label fw-bold">Check-out</label>
                    <input type="date" name="check_out" class="form-control" required>
                </div>

                <div class="col-12 mt-4">
                    <button class="btn btn-primary w-100 py-2 fw-bold text-uppercase" style="letter-spacing: 1px;">
                        <i class="fa-solid fa-circle-check"></i> Create Booking
                    </button>
                </div>

            </form>

            <div class="mt-3">
                <a href="/admin/bookings" class="btn btn-secondary">
                    <i class="fa-solid fa-arrow-left"></i> Back to Bookings
                </a>
            </div>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/app.js"></script>
</body>
</html>
