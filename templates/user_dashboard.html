<!doctype html>
<html>
<head>
  <title>User Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/static/styles.css">
  <meta name="viewport" content="width=device-width,initial-scale=1">
</head>

<body>
<div class="container py-4">

  <div class="d-flex justify-content-between align-items-center">
    <h3>Welcome, <span class="text-primary">{{ username }}</span></h3>

    <div>
      <a href="/book" class="btn btn-primary me-2"><i class="fa-solid fa-plus"></i> Book Room</a>
      <a href="/rooms" class="btn btn-outline-info me-2"><i class="fa-solid fa-bed"></i> Rooms</a>
      <a href="/logout" class="btn btn-danger"><i class="fa-solid fa-right-from-bracket"></i> Logout</a>
    </div>
  </div>

  <h4 class="mt-4">Your Bookings</h4>

  {% if bookings %}
  <div class="card p-3 mt-3 shadow-sm">
    <div class="table-responsive">
      <table class="table table-hover align-middle">
        <thead class="table-light">
          <tr>
            <th>ID</th>
            <th>Room</th>
            <th>Check-in</th>
            <th>Check-out</th>
            <th>Status</th>
            <th>Payments</th>
          </tr>
        </thead>

        <tbody>
          {% for b in bookings %}
          <tr>
            <td>{{ b[0] }}</td>
            <td>{{ b[6] }}</td>
            <td>{{ b[3] }}</td>
            <td>{{ b[4] }}</td>
            <td>{{ b[5] }}</td>
            <td>
              <a href="/booking/{{ b[0] }}/payments" class="btn btn-outline-primary btn-sm">
                <i class="fa-solid fa-money-check-dollar"></i> View
              </a>
            </td>
          </tr>
          {% endfor %}
        </tbody>

      </table>
    </div>
  </div>

  {% else %}
  <div class="alert alert-info mt-3">No bookings yet.</div>
  {% endif %}

</div>
</body>
</html>
